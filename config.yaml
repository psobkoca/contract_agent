llm:
  provider: anthropic
  model: claude-sonnet-4-20250514
  max_tokens: 1500
  daily_spend_limit: 50.00

classifier:
  confidence_threshold: 0.60
  high_risk_types:
    - Liability
    - Indemnification
    - IP

rag:
  chunk_size: 512
  chunk_overlap: 64
  top_k: 6
  rerank_top_n: 3

risk_scoring:
  weights:
    type: 0.35
    one_sidedness: 0.30
    market_deviation: 0.25
    jurisdiction: 0.10

parsing:
  min_clause_chars: 80

agent:
  max_clauses_per_run: 10
  max_iterations: 3

output:
  report_dir: ./reports
  log_path: ./agent.log
  log_level: INFO

safety:
  legal_disclaimer: "This output is generated by an AI agent and does not constitute legal advice. All suggested redlines must be reviewed and approved by qualified legal counsel before use."

reproducibility:
  classifier_seed: 42
  embedding_model_version: "all-MiniLM-L6-v2"
